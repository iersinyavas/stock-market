spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
#spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=true

#spring.datasource.url=jdbc:postgresql://93.89.235.173:5432/business-management?ersin
spring.datasource.url=jdbc:postgresql://localhost:5433/postgres?stock

spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.connectionProperties=useUnicode=true;characterEncoding=utf-8;

# The SQL dialect makes Hibernate generate better SQL for the chosen database
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.PostgreSQLDialect

spring.jpa.properties.hibernate.default_schema=stock

# Hibernate ddl auto (create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto = update
# Show or not log for each sql query
spring.jpa.show-sql = true
spring.main.allow-bean-definition-overriding=true

spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true


